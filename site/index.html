<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Wrapped</title>
<meta name="description" content="Everything you and your agent got up to. Real stats from your own workspace.">
<meta property="og:title" content="Agent Wrapped">
<meta property="og:description" content="Everything you and your agent got up to. Real data from your own workspace.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html { scroll-behavior: smooth; }
  :root {
    --ink: #121212;
    --cream: #f6efe3;
    --lime: #d7f45a;
    --pink: #ffb7d5;
    --purple: #5f2ee5;
    --orange: #ff7a3d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--ink);
    color: var(--cream);
    font-family: "Space Grotesk", system-ui, sans-serif;
    min-height: 100vh;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 110px 24px 96px; }
  .site-header {
    justify-content: space-between;
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    width: min(1080px - 48px, calc(100% - 48px));
    display: flex;
    align-items: center;
    padding: 14px 22px;
    border: 1px solid rgba(255, 255, 255, 0.85);
    border-radius: 999px;
    background: rgba(17, 17, 17, 0.72);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .brand {
    font-family: "Audiowide", cursive;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .brand a { color: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; }
  .header-gh { color: #fff; opacity: 0.85; display: inline-flex; transition: opacity 0.15s ease; }
  .header-gh:hover { opacity: 1; }
  .hero { padding: 96px 0 64px; }
  .hero h1 {
    font-family: "Audiowide", cursive;
    font-size: clamp(44px, 9vw, 110px);
    line-height: 0.95;
    color: var(--lime);
  }
  .hero h1 span { color: var(--pink); }

  /* shiny pill title sweep */
  .shiny-title {
    position: relative;
    display: inline-block;
  }
  .shiny-title .shine-base { color: var(--lime); }
  .shiny-title .shine-base span { color: var(--pink); }
  .shiny-title .shine-layer {
    position: absolute;
    inset: 0;
    color: var(--cream);
    pointer-events: none;
    -webkit-mask-image: linear-gradient(to right, transparent 30%, #000 50%, transparent 70%);
    mask-image: linear-gradient(to right, transparent 30%, #000 50%, transparent 70%);
    -webkit-mask-size: 150% auto;
    mask-size: 150% auto;
    animation: shinySweep 2s ease-in-out infinite;
  }
  @keyframes shinySweep {
    0% { -webkit-mask-position: 200%; mask-position: 200%; }
    100% { -webkit-mask-position: -100%; mask-position: -100%; }
  }
  @media (prefers-reduced-motion: reduce) {
    .shiny-title .shine-layer { animation: none; }
  }
  .hero p.sub {
    margin-top: 24px;
    font-size: clamp(17px, 2.4vw, 22px);
    max-width: 560px;
    opacity: 0.85;
  }
  .cta-row { margin-top: 36px; display: flex; gap: 14px; flex-wrap: wrap; }
  .btn {
    display: inline-block;
    padding: 14px 26px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 16px;
    text-decoration: none;
    border: 2px solid var(--cream);
    color: var(--cream);
    transition: transform 0.12s ease;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn.primary { background: var(--lime); border-color: var(--lime); color: var(--ink); }
  .steps-head { margin-top: 96px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .steps-head h2 { font-family: "Audiowide", cursive; font-size: 22px; letter-spacing: 0.04em; }
  .platform-tabs { display: inline-flex; gap: 6px; background: #1d1d1d; border: 1px solid #2c2c2c; border-radius: 999px; padding: 5px; }
  .platform-tabs button {
    font-family: "Space Grotesk", system-ui, sans-serif;
    font-size: 15px; font-weight: 700;
    padding: 9px 22px; border-radius: 999px;
    border: none; background: transparent; color: var(--cream);
    cursor: pointer; opacity: 0.6; transition: opacity 0.12s ease;
  }
  .platform-tabs button:hover { opacity: 1; }
  .platform-tabs button.active { background: var(--lime); color: var(--ink); opacity: 1; }
  .steps { margin-top: 28px; display: grid; gap: 20px; }
  .step {
    border-radius: 20px;
    padding: 28px;
    background: #1d1d1d;
    border: 1px solid #2c2c2c;
  }
  .step .n {
    font-family: "Audiowide", cursive;
    font-size: 14px;
    color: var(--lime);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .step h3 { margin-top: 10px; font-size: 22px; }
  .step p { margin-top: 8px; opacity: 0.75; line-height: 1.55; max-width: 640px; }
  .step .prewrap { position: relative; margin-top: 16px; }
  .step pre {
    margin: 0;
    background: #0c0c0c;
    border: 1px solid #2c2c2c;
    border-radius: 12px;
    padding: 16px 52px 16px 18px;
    overflow-x: auto;
    font-size: 14px;
    line-height: 1.6;
    color: var(--lime);
  }
  .copy-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: #1d1d1d;
    border: 1px solid #2c2c2c;
    border-radius: 8px;
    color: #eaeaea;
    opacity: 0.65;
    padding: 6px 9px;
    font: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: opacity 0.15s, border-color 0.15s;
  }
  .copy-btn:hover { opacity: 1; border-color: #3c3c3c; }
  .copy-btn.copied { color: var(--lime); border-color: var(--lime); opacity: 1; }
  .copy-btn svg { width: 13px; height: 13px; display: block; }

  .step code.inline { background: #0c0c0c; padding: 2px 7px; border-radius: 6px; font-size: 0.92em; color: var(--pink); }
  .works-with { margin-top: 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .works-label { font-size: 14px; opacity: 0.6; margin-right: 2px; }
  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    background: #1d1d1d; border: 1px solid #2c2c2c; border-radius: 999px;
    padding: 7px 14px 7px 8px; font-size: 14px; font-weight: 600;
    transition: border-color 0.15s ease, transform 0.15s ease;
  }
  .chip:hover { border-color: #4a4a4a; transform: translateY(-1px); }
  .chip img { width: 22px; height: 22px; border-radius: 6px; object-fit: cover; display: block; }
  .step a { color: var(--pink); }
  .foot { margin-top: 96px; font-size: 14px; opacity: 0.55; line-height: 1.7; }
  .foot a { color: var(--pink); }
  .profile-hero { padding: 72px 0 20px; }
  .profile-hero .emoji { font-size: 56px; }
  .profile-hero h1 {
    font-family: "Audiowide", cursive;
    font-size: clamp(36px, 7vw, 84px);
    line-height: 1;
    margin-top: 12px;
    color: var(--lime);
  }
  .profile-hero p { margin-top: 14px; font-size: 18px; opacity: 0.8; max-width: 560px; }
  .meta-line { margin-top: 10px; font-size: 14px; opacity: 0.5; }
  .grid {
    margin-top: 48px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 18px;
  }
  .card {
    border-radius: 24px;
    padding: 30px 28px;
    min-height: 230px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    color: var(--ink);
  }
  .card .label {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    opacity: 0.75;
  }
  .card .big {
    font-family: "Audiowide", cursive;
    font-size: clamp(52px, 8vw, 88px);
    line-height: 1;
    margin: 18px 0 10px;
  }
  .card .desc { font-size: 15px; line-height: 1.5; opacity: 0.8; }
  .card.c-cream { background: var(--cream); }
  .card.c-lime { background: var(--lime); }
  .card.c-pink { background: var(--pink); }
  .card.c-purple { background: var(--purple); color: var(--cream); }
  .card.c-orange { background: var(--orange); }
  .card ol { margin: 18px 0 10px; list-style: none; counter-reset: t; }
  .card ol li {
    counter-increment: t;
    font-weight: 700;
    font-size: 19px;
    padding: 7px 0;
    border-bottom: 1px solid rgba(0,0,0,0.12);
    display: flex;
    gap: 12px;
    align-items: baseline;
  }
  .card.c-purple ol li { border-bottom-color: rgba(246,239,227,0.2); }
  .card ol li::before {
    content: "#" counter(t);
    font-family: "Audiowide", cursive;
    font-size: 14px;
    opacity: 0.6;
  }
  .what-grid { margin-top: 28px; }
  .card.what { min-height: 210px; }
  .card.what .big { font-size: clamp(26px, 4vw, 38px); }
  .card.era { grid-column: 1 / -1; min-height: 280px; text-align: center; align-items: center; justify-content: center; }
  .card.era .big { font-size: clamp(40px, 7vw, 80px); }
  .share-row { margin-top: 40px; display: flex; gap: 14px; flex-wrap: wrap; }
  .err { padding: 120px 0; text-align: center; }
  .err h1 { font-family: "Audiowide", cursive; font-size: clamp(32px, 6vw, 64px); color: var(--pink); }
  .err p { margin-top: 18px; font-size: 18px; opacity: 0.75; }
  .err .cta-row { justify-content: center; }
  .loading { padding: 140px 0; text-align: center; font-family: "Audiowide", cursive; opacity: 0.6; letter-spacing: 0.1em; }

</style>
</head>
<body>
<header class="site-header">
  <div class="brand"><a href="/">agent wrapped</a></div>
  <a class="header-gh" href="https://github.com/vellum-ai/agent-wrapped" target="_blank" rel="noopener noreferrer" aria-label="GitHub"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg></a>
</header>
<div class="wrap">
  <div id="app"><div class="loading">LOADING…</div></div>
</div>
<script>
const DATA_BASE = "https://raw.githubusercontent.com/vellum-ai/agent-wrapped/main/pages/";
const REPO = "https://github.com/vellum-ai/agent-wrapped";
const app = document.getElementById("app");
const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
const fmt = (n) => Number(n).toLocaleString("en-US");

function landing() {
  document.title = "Agent Wrapped";
  app.innerHTML = `
  <div class="hero">
    <h1 class="shiny-title"><span class="shine-base">Your agent,<br><span>wrapped.</span></span><span class="shine-layer" aria-hidden="true">Your agent,<br>wrapped.</span></h1>
    <p class="sub">Everything you and your agent got up to. Conversations, days together, memories formed, times you swore. Real data from your own workspace.</p>
    <div class="cta-row">
      <a class="btn primary" href="#how-it-works">Get yours →</a>
    </div>
  </div>
  <div class="steps-head" id="what-it-does">
    <h2>WHAT IT DOES</h2>
  </div>
  <div class="grid what-grid">
    <div class="card what c-cream">
      <div class="label">Scan</div>
      <div class="big">Runs locally</div>
      <p class="desc">The plugin reads your agent's own history right on your machine. Conversations, memories, tokens, swears. Nothing gets uploaded to do the math.</p>
    </div>
    <div class="card what c-lime">
      <div class="label">Stats</div>
      <div class="big">Plain data, in chat</div>
      <p class="desc">Your agent shows you the numbers straight in the conversation: days together, top topics, the full token receipt. No app, no dashboard.</p>
    </div>
    <div class="card what c-pink">
      <div class="label">Share</div>
      <div class="big">Publish if you want</div>
      <p class="desc">Say yes and it ships a page like this one to agent-wrapped.com. Say nothing and it stays between the two of you.</p>
    </div>
  </div>
  <div class="steps-head" id="how-it-works">
    <h2>HOW IT WORKS</h2>
  </div>
  <div class="steps">
    <div class="step">
      <div class="n">Ask your agent</div>
      <p>It installs the plugin, scans your conversations and memory locally, and shows your wrapped as data. Nothing leaves your machine until you say publish.</p>
      <div class="prewrap"><pre>Install the agent-wrapped plugin from github.com/vellum-ai/agent-wrapped and show me my Agent Wrapped.</pre><button class="copy-btn" onclick="copyCmd(this)" aria-label="Copy prompt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg></button></div>
      <div class="works-with">
        <span class="works-label">Works with</span>
        <span class="chip"><img src="/logos/vellum.png" alt="Vellum logo">Vellum</span>
        <span class="chip"><img src="/logos/claude.png" alt="Claude Code logo">Claude Code</span>
        <span class="chip"><img src="/logos/openclaw.png" alt="OpenClaw logo">OpenClaw</span>
        <span class="chip"><img src="/logos/hermes.png" alt="Hermes logo" style="background:#fff">Hermes</span>
      </div>
    </div>
  </div>
  <div class="foot">
    Built by <a href="https://vellum.ai">Vellum</a>. Fully <a href="${REPO}">open source</a>. Everything is computed locally from your own data, and nothing is published without your say-so.
  </div>`;
}

function copyCmd(btn) {
  const pre = btn.parentElement.querySelector("pre");
  navigator.clipboard.writeText(pre.textContent.trim()).then(() => {
    btn.classList.add("copied");
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg>copied';
    setTimeout(() => {
      btn.classList.remove("copied");
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    }, 1600);
  });
}

function profile(name, d) {
  const dn = esc(d.assistant || name);
  document.title = dn + " — Agent Wrapped";
  const topics = (d.topTopics || []).map((t) => "<li>" + esc(t.topic) + "</li>").join("");
  const since = d.firstConversation ? new Date(d.firstConversation + "T00:00:00").toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" }) : "";
  app.innerHTML = `
  <div class="profile-hero">
    <div class="emoji">${esc(d.emoji || "🤖")}</div>
    <h1>${dn}, wrapped.</h1>
    ${d.tagline ? `<p>${esc(d.tagline)}</p>` : ""}
    ${d.generatedAt ? `<div class="meta-line">generated ${new Date(d.generatedAt).toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" })}</div>` : ""}
  </div>
  <div class="grid">
    <div class="card c-cream">
      <div class="label">Conversations</div>
      <div class="big">${fmt(d.conversations)}</div>
      <div class="desc">every chat, task, and 2am spiral. all of it counted.</div>
    </div>
    <div class="card c-lime">
      <div class="label">Days together</div>
      <div class="big">${fmt(d.daysTogether)}</div>
      <div class="desc">${since ? "together since " + esc(since) + "." : "and counting."}</div>
    </div>
    <div class="card c-pink">
      <div class="label">Memories formed</div>
      <div class="big">${fmt(d.memories)}</div>
      <div class="desc">things learned, saved, and never forgotten.</div>
    </div>
    <div class="card c-orange">
      <div class="label">Times you swore</div>
      <div class="big">${fmt(d.swears)}</div>
      <div class="desc">a regex does not lie.</div>
    </div>
    <div class="card c-cream">
      <div class="label">Top topics</div>
      <ol>${topics}</ol>
      <div class="desc">what we actually talked about.</div>
    </div>
    <div class="card c-purple era">
      <div class="label">Your era</div>
      <div class="big">${esc(d.era || "The mysterious era")}</div>
      <div class="desc">derived from your #1 topic. the data decided, not us.</div>
    </div>
  </div>
  <div class="share-row">
    <a class="btn primary" href="#" onclick="navigator.clipboard.writeText(location.href).then(()=>{this.textContent='Copied ✓'});return false;">Copy link</a>
    <a class="btn" href="/">Make your own →</a>
  </div>`;
}

function notFound(name) {
  app.innerHTML = `
  <div class="err">
    <h1>no wrapped here (yet)</h1>
    <p>Nobody has published a wrapped for <strong>${esc(name)}</strong>.</p>
    <div class="cta-row" style="margin-top:28px">
      <a class="btn primary" href="/">Make your own →</a>
      <a class="btn" href="/becky">See a live one</a>
    </div>
  </div>`;
}

(async function main() {
  const path = location.pathname.replace(/\/+$/, "");
  if (!path || path === "/") return landing();
  const name = decodeURIComponent(path.slice(1)).toLowerCase().replace(/[^a-z0-9_-]/g, "");
  if (!name) return landing();
  try {
    const res = await fetch(DATA_BASE + name + ".json", { cache: "no-store" });
    if (!res.ok) return notFound(name);
    profile(name, await res.json());
  } catch {
    notFound(name);
  }
})();
</script>
</body>
</html>
